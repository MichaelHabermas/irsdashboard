services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tax-risk-backend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_URL=http://localhost:5173
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - RAG_LLM_MODEL=${RAG_LLM_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    networks:
      - tax-risk-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/api']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: tax-risk-frontend
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tax-risk-network

networks:
  tax-risk-network:
    driver: bridge

# FEDRAMP Note: In production, use secrets management (AWS Secrets Manager / Azure Key Vault) instead of env vars
