version: 1
name: tax-risk-dashboard

# FEDRAMP Note: This is a demo deployment. In real Treasury environments, use FedRAMP-authorized regions and secrets management.

services:
  # Backend - NestJS + TensorFlow.js + RAG
  - type: web
    name: tax-risk-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Render uses 10000 by default
      - key: OPENROUTER_API_KEY
        sync: false # You will be prompted to fill this
      - key: RAG_LLM_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: EMBEDDING_MODEL
        value: nomic-ai/nomic-embed-text
      - key: JWT_SECRET
        generateValue: true # Auto-generates a secure secret
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_URL
        fromService:
          name: tax-risk-frontend
          type: static
          property: host

  # Frontend - React Vite Static Site (Free)
  - type: static
    name: tax-risk-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: tax-risk-backend
          type: web
          property: host

# Optional: Enable preview environments for PRs
previews:
  generation: automatic
